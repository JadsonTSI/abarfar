<h3 class="mt-4 mb-3 text-white fw-bold">🎵 Músicos do Grupo</h3>

<div class="card p-3" style="background:#1b1717; border-radius:18px;">
    <div class="table-responsive">
        <table class="table table-dark table-hover align-middle">
            <thead class="table-secondary text-dark">
                <tr>
                    <th>Nome</th>
                    <th>Instrumento</th>
                    <th>Naipe</th>
                    <th>Função</th>
                    <th>Ação</th>
                </tr>
            </thead>

            <tbody>
                {% for aluno in alunos %}
                <tr>
                    <td>{{ aluno.nome }} {{ aluno.sobrenome }}</td>
                    <td>{{ aluno.instrumento|default:"—" }}</td>
                    <td>{{ aluno.naipe|default:"—" }}</td>
                    <td>{{ aluno.funcao|default:"—" }}</td>

                    <td>
                        <a href="{% url 'grupos:editar_funcao' aluno.id %}"
                           class="btn btn-warning btn-sm px-3">
                            Editar Função
                        </a>
                    </td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="5" class="text-center text-muted py-3">
                        Nenhum músico cadastrado neste grupo.
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
