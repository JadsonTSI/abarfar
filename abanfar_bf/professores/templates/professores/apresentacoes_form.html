{% load static %}

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Bootstrap -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />

  <!-- CSS do sistema -->
  <link rel="stylesheet" href="{% static 'ensaios_pro.css' %}" />
  <link rel="stylesheet" href="{% static 'professor.css' %}" />
</head>

<body>

<div class="container-fluid g-0">
  <div class="row g-0">

    <!-- SIDEBAR -->
    <aside class="col-12 col-md-3 col-lg-2 sidebar d-flex flex-column">
      <div class="d-flex align-items-center justify-content-between px-3 py-3 sidebar-top">
        <h2 class="logo-text mb-0">ABANFAR-BF</h2>
        <button class="btn btn-circle"><i class="bi bi-person-fill"></i></button>
      </div>

      <div class="sidebar-profile text-center py-3">
        <div class="profile-icon mb-2">
          <i class="bi bi-person-circle"></i>
        </div>
        <button class="btn btn-profile">PROFESSOR</button>
      </div>

      <nav class="sidebar-menu flex-grow-1 mt-4">
        <ul class="nav flex-column">
          <li class="nav-item mb-3">
            <a href="{% url 'professores:professoreshome' %}" class="nav-link d-flex align-items-center">
              <i class="bi bi-house-door me-3"></i> INICIO
            </a>
          </li>

          <li class="nav-item mb-3">
            <a href="#" class="nav-link d-flex align-items-center">
              <i class="bi bi-music-note me-3"></i> NIPES
            </a>
          </li>

          <li class="nav-item mb-3">
            <a href="{% url 'materias:materias_professor' %}" class="nav-link d-flex align-items-center">
              <i class="bi bi-journal-bookmark-fill me-3"></i> Minhas Matérias
            </a>
          </li>

          <li class="nav-item mb-3">
            <a href="{% url 'professores:ensaiospro' %}" class="nav-link d-flex align-items-center">
              <i class="bi bi-music-note-beamed me-3"></i> ENSAIOS
            </a>
          </li>

          <li class="nav-item mb-3">
            <a href="{% url 'professores:apresentacoes_list' %}" class="nav-link d-flex align-items-center active">
              <i class="bi bi-grid-3x3-gap-fill me-3"></i> APRESENTAÇÕES
            </a>
          </li>

          <li class="nav-item mb-3">
            <a href="#" class="nav-link d-flex align-items-center">
              <i class="bi bi-music-note-list me-3"></i> GRUPOS MUSICAIS
            </a>
          </li>
        </ul>
      </nav>
    </aside>

    <!-- CONTEÚDO PRINCIPAL -->
    <main class="col-12 col-md-9 col-lg-10 p-4">

      <div class="container-fluid">
        <div class="form-container mx-auto" style="max-width: 700px;">
          <h2 class="titulo-form mb-4">Cadastro de Apresentação</h2>

          <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}

            <button class="btn-submit mt-3" type="submit">Salvar</button>
          </form>
        </div>
      </div>

    </main>

  </div>
</div>

</body>
</html>
