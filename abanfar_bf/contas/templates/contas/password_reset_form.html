{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <link rel="icon" type="image/png" href="{% static 'img/logo_abanfar.png' %}?v=2">
    <meta charset="UTF-8">
    <title>Recuperar Senha — ABANFAR BF</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Cormorant+Garamond:wght@300;400;600&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold:       #C9A84C;
            --gold-light: #E8C96A;
            --gold-pale:  #F5E9C8;
            --gold-dim:   #9A7A30;
            --cream:      #FDFAF3;
            --white:      #FFFFFF;
            --ink:        #1A1612;
            --ink-soft:   #3D3530;
            --gray-text:  #7A6E65;
            --gray-line:  #E8E0D4;
            --section-bg: #F9F5EC;
            --radius-lg:  1.25rem;
            --radius-sm:  0.6rem;
            --shadow-soft: 0 8px 40px rgba(26,22,18,0.08);
            --transition: 0.28s ease;
        }
        body {
            font-family: 'Cormorant Garamond', Georgia, serif;
            background: var(--section-bg);
            color: var(--ink-soft);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
            position: relative;
            overflow-x: hidden;
        }
        .music-float {
            position: absolute;
            color: var(--gold);
            opacity: 0.05;
            pointer-events: none;
            user-select: none;
            line-height: 1;
        }
        .music-float:nth-child(1) { font-size: 7rem; top: 10%; left: 10%; }
        .music-float:nth-child(2) { font-size: 5rem; bottom: 10%; right: 10%; }
        .bg-clef {
            position: absolute;
            left: 50%; top: 50%;
            transform: translate(-50%, -50%);
            font-size: 30rem;
            color: var(--gold);
            opacity: 0.02;
            pointer-events: none;
        }
        .reset-card {
            background: var(--cream);
            border: 2px solid var(--gold);
            border-radius: var(--radius-lg);
            width: 100%;
            max-width: 460px;
            padding: 3rem 2.5rem;
            box-shadow: var(--shadow-soft);
            position: relative;
            z-index: 10;
        }
        .form-eyebrow {
            font-family: 'Libre Baskerville', serif;
            font-size: 0.68rem;
            letter-spacing: 0.28em;
            text-transform: uppercase;
            color: var(--gold);
            display: flex;
            align-items: center;
            gap: 0.6rem;
            margin-bottom: 0.6rem;
        }
        .form-eyebrow::before {
            content: '';
            width: 28px; height: 1px;
            background: var(--gold);
        }
        .form-heading {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            font-weight: 900;
            color: var(--ink);
            line-height: 1.1;
            margin-bottom: 0.4rem;
        }
        .form-sub {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.05rem;
            color: var(--gray-text);
            margin-bottom: 2rem;
            line-height: 1.6;
        }
        .form-label-custom {
            font-family: 'Libre Baskerville', serif;
            font-size: 0.72rem;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--ink-soft);
            display: block;
            margin-bottom: 0.45rem;
        }
        .input-group-custom {
            position: relative;
            margin-bottom: 1.8rem;
        }
        .input-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gold-dim);
            font-size: 1rem;
            pointer-events: none;
        }
        .input-field {
            width: 100%;
            background: var(--white);
            border: 1.5px solid var(--gray-line);
            border-radius: var(--radius-sm);
            padding: 0.75rem 1rem 0.75rem 2.8rem;
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.05rem;
            color: var(--ink);
            outline: none;
            transition: all var(--transition);
        }
        .input-field:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(201,168,76,0.14);
        }
        .btn-reset {
            width: 100%;
            background: var(--gold);
            color: var(--ink);
            font-family: 'Libre Baskerville', serif;
            font-size: 0.82rem;
            font-weight: 700;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            border: none;
            border-radius: var(--radius-sm);
            padding: 0.9rem;
            cursor: pointer;
            transition: all var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            box-shadow: 0 6px 22px rgba(201,168,76,0.25);
        }
        .btn-reset:hover {
            background: var(--gold-light);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(201,168,76,0.35);
        }
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            font-family: 'Libre Baskerville', serif;
            font-size: 0.72rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--gray-text);
            text-decoration: none;
            margin-top: 1.8rem;
            transition: all var(--transition);
        }
        .back-link:hover {
            color: var(--gold);
            gap: 0.6rem;
        }
        .form-divider {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            margin-bottom: 1.8rem;
        }
        .form-divider::before, .form-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--gray-line);
        }
        .form-divider span {
            color: var(--gold);
            font-size: 1.1rem;
        }
        .errorlist {
            list-style: none;
            padding: 0;
            margin: 0 0 1rem;
            color: #C0392B;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>
    <div class="music-float">𝄞</div>
    <div class="music-float">♫</div>
    <div class="bg-clef">𝄞</div>

    <div class="reset-card">
        <div class="form-eyebrow">
            <i class="bi bi-shield-lock"></i> Seguros
        </div>
        <h2 class="form-heading">Recuperar<br>Senha</h2>
        <p class="form-sub">Informe seu e-mail para receber as instruções de redefinição.</p>

        <div class="form-divider"><span>♩</span></div>

        <form method="post" novalidate>
            {% csrf_token %}

            {% if form.email.errors %}
                <ul class="errorlist">
                    {% for error in form.email.errors %}
                        <li><i class="bi bi-exclamation-circle me-1"></i> {{ error }}</li>
                    {% endfor %}
                </ul>
            {% endif %}

            <label class="form-label-custom" for="id_email">Endereço de E-mail</label>
            <div class="input-group-custom">
                <i class="bi bi-envelope input-icon"></i>
                <input type="email" name="email" id="id_email" class="input-field" placeholder="exemplo@abanfarbf.org" required>
            </div>

            <button type="submit" class="btn-reset">
                <i class="bi bi-send-fill"></i> Enviar Link
            </button>
        </form>

        <div class="text-center">
            <a href="{% url 'contas:login' %}" class="back-link">
                <i class="bi bi-arrow-left"></i> Voltar ao Login
            </a>
        </div>
    </div>
</body>
</html>
